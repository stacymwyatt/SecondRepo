<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Results Dashboard</title>

  <!-- Chart.js — a lightweight, free charting library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #333;
      margin: 0;
      padding: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* Summary cards at the top */
    .summary {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 1.25rem 1.75rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      min-width: 140px;
    }

    .card .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.4rem;
    }

    .card .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .card.green .value { color: #22c55e; }
    .card.red .value   { color: #ef4444; }
    .card.blue .value  { color: #3b82f6; }

    /* Chart container */
    .chart-container {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
      max-width: 900px;
    }

    .chart-container h2 {
      font-size: 1rem;
      margin: 0 0 1rem 0;
      color: #555;
    }

    /* Recent runs table */
    .table-container {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      max-width: 900px;
    }

    .table-container h2 {
      font-size: 1rem;
      margin: 0 0 1rem 0;
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid #e5e7eb;
      color: #888;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #f0f0f0;
    }

    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .badge.pass { background: #dcfce7; color: #16a34a; }
    .badge.fail { background: #fee2e2; color: #dc2626; }

    .no-data {
      text-align: center;
      padding: 3rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>Contact List App — Test Results</h1>
  <p class="subtitle">Pass/fail trend from scheduled nightly Playwright runs</p>

  <!-- Summary cards -->
  <div class="summary">
    <div class="card blue">
      <div class="label">Total Runs</div>
      <div class="value" id="totalRuns">—</div>
    </div>
    <div class="card green">
      <div class="label">Last Run Passed</div>
      <div class="value" id="lastPassed">—</div>
    </div>
    <div class="card red">
      <div class="label">Last Run Failed</div>
      <div class="value" id="lastFailed">—</div>
    </div>
    <div class="card blue">
      <div class="label">Pass Rate (all time)</div>
      <div class="value" id="passRate">—</div>
    </div>
  </div>

  <!-- Trend chart -->
  <div class="chart-container">
    <h2>Pass / Fail Trend Over Time</h2>
    <canvas id="trendChart" height="100"></canvas>
  </div>

  <!-- Recent runs table -->
  <div class="table-container">
    <h2>Recent Runs</h2>
    <table id="runsTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Status</th>
          <th>Passed</th>
          <th>Failed</th>
          <th>Total</th>
          <th>Failed Tests</th>
        </tr>
      </thead>
      <tbody id="runsBody">
        <tr><td colspan="6" class="no-data">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // Load test-history.json and build the dashboard
    fetch('test-history.json')
      .then(res => {
        if (!res.ok) throw new Error('test-history.json not found');
        return res.json();
      })
      .then(history => {
        if (!history.length) {
          document.getElementById('runsBody').innerHTML =
            '<tr><td colspan="6" class="no-data">No runs recorded yet.</td></tr>';
          return;
        }

        // ── Summary cards ──────────────────────────────────────────────
        const last = history[history.length - 1];
        const totalPassed = history.reduce((sum, r) => sum + r.passed, 0);
        const totalTests  = history.reduce((sum, r) => sum + r.total, 0);
        const passRate    = totalTests > 0
          ? Math.round((totalPassed / totalTests) * 100) + '%'
          : '—';

        document.getElementById('totalRuns').textContent  = history.length;
        document.getElementById('lastPassed').textContent = last.passed;
        document.getElementById('lastFailed').textContent = last.failed;
        document.getElementById('passRate').textContent   = passRate;

        // ── Trend chart ────────────────────────────────────────────────
        // Show up to the last 30 runs so the chart stays readable
        const recent = history.slice(-30);
        const labels = recent.map(r =>
          new Date(r.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        );

        new Chart(document.getElementById('trendChart'), {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'Passed',
                data: recent.map(r => r.passed),
                backgroundColor: '#22c55e',
              },
              {
                label: 'Failed',
                data: recent.map(r => r.failed),
                backgroundColor: '#ef4444',
              },
            ],
          },
          options: {
            responsive: true,
            scales: {
              x: { stacked: true },
              y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } },
            },
            plugins: {
              legend: { position: 'top' },
            },
          },
        });

        // ── Runs table (most recent first) ─────────────────────────────
        const tbody = document.getElementById('runsBody');
        tbody.innerHTML = '';

        [...history].reverse().forEach(run => {
          const date   = new Date(run.date).toLocaleString();
          const status = run.failed === 0 ? 'pass' : 'fail';
          const label  = run.failed === 0 ? 'All Passed' : 'Failed';
          const failed = run.failedTests.length
            ? run.failedTests.join(', ')
            : '—';

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${date}</td>
            <td><span class="badge ${status}">${label}</span></td>
            <td>${run.passed}</td>
            <td>${run.failed}</td>
            <td>${run.total}</td>
            <td style="color:#888;font-size:0.85rem">${failed}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(() => {
        document.getElementById('runsBody').innerHTML =
          '<tr><td colspan="6" class="no-data">Could not load test-history.json. Run your tests first.</td></tr>';
      });
  </script>

</body>
</html>
