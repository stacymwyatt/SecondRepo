# .github/workflows/test.yml
# This file tells GitHub to run your tests automatically
# every time you push code or open a pull request,
# and on a nightly schedule.

name: Run Tests

on:
  push:              # run when you push any branch
  pull_request:      # run when you open a pull request
  schedule:
    - cron: '0 2 * * *'  # run every day at 2:00am UTC
  workflow_dispatch: # adds a "Run workflow" button in the GitHub Actions UI

# Permissions needed across all jobs
permissions:
  contents: write  # allows committing test-history.json back to the repo
  pages: write     # allows deploying to GitHub Pages
  id-token: write  # required for GitHub Pages OIDC authentication

jobs:
  # ── Job 1: API tests (Jest) ─────────────────────────────────────────────────
  # These don't need a running server — they spin up their own in-memory setup.
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm test

  # ── Job 2: UI tests (Playwright) ───────────────────────────────────────────
  # These need the server running so Playwright has a real app to interact with.
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Install the Chromium browser that Playwright will control
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Start the server in the background (&) so the next step can run
      - name: Start server
        run: node server.js &

      # Give the server a moment to finish starting before tests hit it
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000

      # Run Playwright in headless mode (no visible browser — there's no screen on GitHub's machines)
      - name: Run UI tests
        run: npx playwright test --config=playwright.config.js

      # If tests fail, save screenshots of what Playwright saw — useful for debugging
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/

      # Save a summary of this run to test-history.json (runs even if tests failed)
      # Skip on pull requests — we only want to track history on real branch runs
      - name: Save test results to history
        if: always() && github.event_name != 'pull_request'
        run: node save-results.js

      # Commit the updated test-history.json back to the repo so history accumulates
      - name: Commit updated test history
        if: always() && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-history.json
          git diff --cached --quiet || git commit -m "chore: update test history [skip ci]"
          git push

      # Bundle dashboard.html and test-history.json into a site/ folder for Pages
      - name: Prepare Pages site
        if: always() && github.event_name != 'pull_request'
        run: |
          mkdir -p site
          cp dashboard.html site/index.html
          cp test-history.json site/

      # Upload the site/ folder as a Pages artifact for the deploy job to use
      - name: Upload Pages artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # ── Job 3: Deploy to GitHub Pages ──────────────────────────────────────────
  # Publishes the dashboard so anyone can view it without running a local server.
  # Only runs after ui-tests completes, and never on pull requests.
  deploy-pages:
    runs-on: ubuntu-latest
    needs: ui-tests  # wait for ui-tests to finish before deploying
    if: github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}  # the live URL after deploy

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
